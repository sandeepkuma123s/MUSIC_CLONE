<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spotify - Favorite Music</title>

<link rel="stylesheet" href="style.css">

<script src="https://kit.fontawesome.com/b1f5f5a314.js" crossorigin="anonymous"></script>

</head>

<body>

<nav>
<ul>

<li class="brand">
<img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg" width="40">

<div class="songItem">

<i class="fa-solid fa-backward-step"></i>

<i class="fa-solid fa-circle-play" id="masterPlay"></i>

</div>

<div class="songInfo">

<img src="music.gif" width="40" id="gif">
